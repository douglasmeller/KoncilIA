<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>KoncilIA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

   <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div class="container">

<div class="logo">KoncilIA</div>
<div class="subtitle">HUB de automações do KS</div>

<!-- UPLOAD -->
<div class="add-box">

<button id="toggleAddBtn" class="add-toggle-btn">
➕ Adicionar automação
</button>

<div id="addForm" class="card hidden">

<h3>📤 Adicionar automação</h3>

<input type="file" id="fileInput" accept=".py,.ipynb">
<input type="text" id="nickname" placeholder="Apelido do arquivo">

<select id="owner">
<option disabled selected>Responsável</option>
<option>Amanda</option><option>Ana Patrícia</option><option>Angélica</option>
<option>Bianca</option><option>Bruna</option><option>Douglas</option>
<option>Ester</option><option>Fernando</option><option>Gedla</option>
<option>George</option><option>Izabelle</option><option>Laura</option>
<option>Maria Eduarda</option><option>Maria Fernanda</option><option>Matheus</option>
<option>Nathalia Doro</option><option>Nathalia Morais</option>
<option>Pedro</option><option>Stéfani</option>
</select>

<select id="tagSelect" >
</select>

<input type="text" id="colabLink" placeholder="Link do Google Colab">

<textarea id="desc" maxlength="100" placeholder="Descrição da automação"></textarea>
<div class="char-counter" id="desc-counter">0/100</div>
<textarea id="inputs" maxlength="100" placeholder="Inputs necessários"></textarea>
<div class="char-counter" id="desc-counter">0/100</div>
<textarea id="outputs" maxlength="100" placeholder="Outputs gerados"></textarea>
<div class="char-counter" id="desc-counter">0/100</div>
<textarea id="notes" maxlength="100" placeholder="Riscos / Observações"></textarea>
<div class="char-counter" id="desc-counter">0/100</div>

<button onclick="addFile()">Salvar na biblioteca</button>

</div>
</div>


<!-- SEARCH / FILTER -->
<div class="card">
<h3>🔍 Buscar IA's</h3>
<div class="filters">
<input type="text" id="searchInput" placeholder="Buscar por nome ou apelido" onkeyup="renderFiles()">

<select id="filterOwner" onchange="renderFiles()">
<option value="">Todos os responsáveis</option>
<option>Amanda</option><option>Ana Patrícia</option><option>Angélica</option>
<option>Bianca</option><option>Bruna</option><option>Douglas</option>
<option>Ester</option><option>Fernando</option><option>Gedla</option>
<option>George</option><option>Izabelle</option><option>Laura</option>
<option>Maria Eduarda</option><option>Maria Fernanda</option><option>Matheus</option>
<option>Nathalia Doro</option><option>Nathalia Morais</option>
<option>Pedro</option><option>Stéfani</option>
</select>

<select id="filterTag">
  <option value="">Todas as tags</option>
</select>


<input type="date" id="startDate" onchange="renderFiles()">
<input type="date" id="endDate" onchange="renderFiles()">
</div>
</div>

<!-- CONTADORES -->
<div id="stats" class="stats-box">
  <div id="totalCount">Total: 0</div>
  <div id="ownerCount"></div>
  <div id="tagCount"></div>
</div>

<!-- FILE LIST -->
<div class="card">
<h3>Biblioteca de IA's</h3>
<div class="file-grid" id="fileList"></div>
</div>

</div>



</body>
<script src="js/app.js"></script>
</html>
